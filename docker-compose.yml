services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lawer-postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawer"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lawer-redis
    restart: unless-stopped
    env_file: .env
    command:
      - sh
      - -c
      - |
        printf 'requirepass %s\nappendonly yes\n' "$$(printenv REDIS_PASSWORD)" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(printenv REDIS_PASSWORD)\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lawer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: lawer-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 1536m
    cpus: 1.5
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_KEEP_ALIVE: 5m
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: curlimages/curl:latest
    container_name: lawer-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - 'curl -sf http://ollama:11434/api/pull -d ''{"name":"qwen2.5:1.5b"}'''

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lawer-backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: lawer-frontend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollama_data:
