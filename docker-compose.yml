services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lawer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lawer
      POSTGRES_USER: lawer
      POSTGRES_PASSWORD: lawer_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawer"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lawer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lawer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lawer_minio
      MINIO_ROOT_PASSWORD: lawer_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawer-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://lawer:lawer_secret@postgres:5432/lawer?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: lawer_minio
      MINIO_SECRET_KEY: lawer_minio_secret
      MINIO_BUCKET: lawer-documents
      JWT_SECRET: change-me-in-production-use-strong-secret
      JWT_EXPIRES_IN: 7d
      BACKEND_PORT: "3001"
      FRONTEND_URL: http://37.221.127.68:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://37.221.127.68:3001
    container_name: lawer-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://37.221.127.68:3001
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
